<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LinkVault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #eee; min-height: 100vh; }
    .container { max-width: 480px; margin: 60px auto; padding: 20px; }
    h1 { text-align: center; color: #7c6aff; margin-bottom: 30px; font-size: 2rem; }
    .card { background: #1a1a2e; border-radius: 12px; padding: 30px; margin-bottom: 20px; }
    input { width: 100%; padding: 10px 14px; margin: 8px 0; border-radius: 8px;
            border: 1px solid #333; background: #0f0f1a; color: #eee; font-size: 1rem; }
    button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px;
             border: none; background: #7c6aff; color: white; font-size: 1rem;
             cursor: pointer; transition: 0.2s; }
    button:hover { background: #6a58e0; }
    .tabs { display: flex; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; text-align: center; cursor: pointer;
           background: #1a1a2e; border: none; color: #aaa; font-size: 1rem; }
    .tab.active { color: #7c6aff; border-bottom: 2px solid #7c6aff; }
    .msg { text-align: center; margin-top: 10px; font-size: 0.9rem; }
    .success { color: #4caf50; }
    .error { color: #f44336; }
    #dashboard { display: none; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { width: auto; padding: 8px 16px; background: #ff4c4c; }
    .bookmark-form input { margin-bottom: 6px; }
    .bookmark-card { background: #0f0f1a; border-radius: 8px; padding: 14px;
                     margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .bookmark-card a { color: #7c6aff; text-decoration: none; font-weight: bold; }
    .bookmark-card a:hover { text-decoration: underline; }
    .del-btn { background: none; border: none; color: #f44336; cursor: pointer;
               font-size: 1.2rem; width: auto; padding: 0 8px; }
    .category-tag { font-size: 0.75rem; background: #7c6aff33; color: #7c6aff;
                    padding: 2px 8px; border-radius: 20px; margin-top: 4px; display: inline-block; }
  </style>
</head>
<body>

<!-- AUTH SECTION -->
<div class="container" id="auth-section">
  <h1>🔗 LinkVault</h1>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Login</button>
    <button class="tab" onclick="showTab('signup')">Signup</button>
  </div>

  <!-- Login -->
  <div class="card" id="login-form">
    <input type="text" id="login-username" placeholder="Username" />
    <input type="password" id="login-password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p class="msg" id="login-msg"></p>
  </div>

  <!-- Signup -->
  <div class="card" id="signup-form" style="display:none">
    <input type="text" id="signup-username" placeholder="Username" />
    <input type="email" id="signup-email" placeholder="Email" />
    <input type="password" id="signup-password" placeholder="Password" />
    <button onclick="signup()">Create Account</button>
    <p class="msg" id="signup-msg"></p>
  </div>
</div>

<!-- DASHBOARD SECTION -->
<div class="container" id="dashboard">
  <div class="dash-header">
    <h1>🔗 LinkVault</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Add Bookmark -->
  <div class="card bookmark-form">
    <h3 style="margin-bottom:12px; color:#7c6aff">Add Bookmark</h3>
    <input type="text" id="b-title" placeholder="Title" />
    <input type="url" id="b-url" placeholder="URL (https://...)" />
    <input type="text" id="b-category" placeholder="Category (optional)" />
    <input type="text" id="b-notes" placeholder="Notes (optional)" />
    <button onclick="addBookmark()">+ Add</button>
  </div>

  <!-- Bookmarks List -->
  <div id="bookmarks-list"></div>
</div>

<script>
  const API = "https://linkvault-fki1.onrender.com";
  let token = localStorage.getItem("token");

  if (token) showDashboard();

  function showTab(tab) {
    document.getElementById("login-form").style.display = tab === "login" ? "block" : "none";
    document.getElementById("signup-form").style.display = tab === "signup" ? "block" : "none";
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", (tab === "login" && i === 0) || (tab === "signup" && i === 1));
    });
  }

  async function signup() {
    const username = document.getElementById("signup-username").value;
    const email = document.getElementById("signup-email").value;
    const password = document.getElementById("signup-password").value;
    const msg = document.getElementById("signup-msg");
    const res = await fetch(`${API}/signup`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json();
    if (res.ok) {
      msg.className = "msg success";
      msg.textContent = "Account created! Please login.";
      showTab("login");
    } else {
      msg.className = "msg error";
      msg.textContent = data.detail || "Signup failed";
    }
  }

  async function login() {
    const username = document.getElementById("login-username").value;
    const password = document.getElementById("login-password").value;
    const msg = document.getElementById("login-msg");
    const form = new URLSearchParams();
    form.append("username", username);
    form.append("password", password);
    const res = await fetch(`${API}/login`, { method: "POST", body: form });
    const data = await res.json();
    if (res.ok) {
      token = data.access_token;
      localStorage.setItem("token", token);
      showDashboard();
    } else {
      msg.className = "msg error";
      msg.textContent = "Invalid username or password";
    }
  }

  function logout() {
    localStorage.removeItem("token");
    token = null;
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("auth-section").style.display = "block";
  }

  function showDashboard() {
    document.getElementById("auth-section").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadBookmarks();
  }

  async function loadBookmarks() {
    const res = await fetch(`${API}/bookmarks`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    const data = await res.json();
    const list = document.getElementById("bookmarks-list");
    if (!data.length) {
      list.innerHTML = `<p style="text-align:center;color:#666">No bookmarks yet. Add one above!</p>`;
      return;
    }
    list.innerHTML = data.map(b => `
      <div class="bookmark-card">
        <div>
          <a href="${b.url}" target="_blank">${b.title}</a>
          <br/>
          <span class="category-tag">${b.category}</span>
          ${b.notes ? `<p style="font-size:0.85rem;color:#aaa;margin-top:4px">${b.notes}</p>` : ""}
        </div>
        <button class="del-btn" onclick="deleteBookmark(${b.id})">🗑</button>
      </div>
    `).join("");
  }

  async function addBookmark() {
    const title = document.getElementById("b-title").value;
    const url = document.getElementById("b-url").value;
    const category = document.getElementById("b-category").value || "General";
    const notes = document.getElementById("b-notes").value;
    if (!title || !url) return alert("Title aur URL zaroori hai!");
    await fetch(`${API}/bookmarks`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
      body: JSON.stringify({ title, url, category, notes })
    });
    document.getElementById("b-title").value = "";
    document.getElementById("b-url").value = "";
    document.getElementById("b-category").value = "";
    document.getElementById("b-notes").value = "";
    loadBookmarks();
  }

  async function deleteBookmark(id) {
    await fetch(`${API}/bookmarks/${id}`, {
      method: "DELETE",
      headers: { "Authorization": `Bearer ${token}` }
    });
    loadBookmarks();
  }
</script>
</body>
</html>
